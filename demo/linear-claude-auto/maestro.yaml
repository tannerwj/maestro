defaults:
  poll_interval: 30s
  max_concurrent_global: 1

agent_packs_dir: ../../agents

user:
  name: "Your Name"
  linear_username: "you@example.com"

sources:
  - name: linear-demo
    tracker: linear
    connection:
      token_env: MAESTRO_LINEAR_TOKEN
      project: Maestro Testbed
    repo: https://gitlab.com/your-group/your-project.git
    filter:
      states: [Todo]
    agent_type: code-pr
    poll_interval: 15s

agent_types:
  - name: code-pr
    agent_pack: code-pr
    instance_name: demo-coder
    approval_policy: auto

workspace:
  root: ./var/workspaces

state:
  dir: ./var/state
  retry_base: 10s
  max_retry_backoff: 5m
  max_attempts: 3

logging:
  level: info
  dir: ./var/logs
  max_files: 20
