defaults:
  poll_interval: 30s
  max_concurrent_global: 1

agent_packs_dir: ../../agents

user:
  name: "Your Name"
  gitlab_username: "your-gitlab-username"

sources:
  - name: gitlab-demo
    tracker: gitlab
    connection:
      base_url: https://gitlab.com
      token_env: MAESTRO_GITLAB_TOKEN
      project: your-group/your-project
    filter:
      labels: [agent:ready]
    agent_type: code-pr
    poll_interval: 15s

agent_types:
  - name: code-pr
    agent_pack: code-pr
    instance_name: demo-coder
    approval_policy: auto

workspace:
  root: ./var/workspaces

state:
  dir: ./var/state
  retry_base: 10s
  max_retry_backoff: 5m
  max_attempts: 3

logging:
  level: info
  dir: ./var/logs
  max_files: 20
