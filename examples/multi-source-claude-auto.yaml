defaults:
  poll_interval: 30s
  max_concurrent_global: 3
  stall_timeout: 10m

agent_packs_dir: ../agents

user:
  name: "Your Name"
  gitlab_username: "your-gitlab-username"
  linear_username: "you@example.com"

sources:
  - name: gitlab-project
    tracker: gitlab
    connection:
      base_url: https://gitlab.com
      token_env: MAESTRO_GITLAB_TOKEN
      project: your-group/your-project
    filter:
      labels: [agent:ready]
      assignee: $MAESTRO_USER
    agent_type: code-pr
    poll_interval: 15s

  - name: gitlab-epic
    tracker: gitlab-epic
    connection:
      base_url: https://gitlab.com
      token_env: MAESTRO_GITLAB_TOKEN
      group: your-group
    repo: https://gitlab.com/your-group/your-project.git
    epic_filter:
      labels: [bucket:ready]
    issue_filter:
      labels: [agent:ready]
      assignee: $MAESTRO_USER
    agent_type: repo-maintainer
    poll_interval: 15s

  - name: linear-project
    tracker: linear
    connection:
      token_env: MAESTRO_LINEAR_TOKEN
      project: Your Linear Project
    repo: https://gitlab.com/your-group/your-project.git
    filter:
      labels: [agent:ready]
      states: [Todo]
      assignee: $MAESTRO_USER
    agent_type: triage
    poll_interval: 15s

agent_types:
  - name: code-pr
    agent_pack: code-pr
    instance_name: gitlab-project-coder
    approval_policy: auto
    harness: claude-code
    workspace: git-clone
    max_concurrent: 2
    stall_timeout: 10m

  - name: repo-maintainer
    agent_pack: repo-maintainer
    instance_name: gitlab-epic-maintainer
    approval_policy: auto
    harness: claude-code
    workspace: git-clone
    max_concurrent: 2
    stall_timeout: 10m

  - name: triage
    agent_pack: triage
    instance_name: linear-triage
    approval_policy: auto
    harness: claude-code
    workspace: git-clone
    max_concurrent: 2
    stall_timeout: 10m

workspace:
  root: ~/.local/share/maestro/workspaces

state:
  dir: ~/.local/state/maestro
  retry_base: 10s
  max_retry_backoff: 5m
  max_attempts: 3

hooks:
  timeout: 30s

logging:
  level: info
  dir: ~/.local/state/maestro/logs
  max_files: 20
