defaults:
  poll_interval: 30s
  max_concurrent_global: 1
  stall_timeout: 10m

agent_packs_dir: ../agents

user:
  name: "Your Name"
  gitlab_username: "your-gitlab-username"

sources:
  - name: gitlab-epics
    tracker: gitlab-epic
    connection:
      base_url: https://gitlab.com
      token_env: MAESTRO_GITLAB_TOKEN
      group: your-group-or-subgroup
    repo: https://gitlab.com/your-group/your-project.git
    epic_filter:
      # Optional: pin the source to exact epic IIDs inside the group.
      # iids: [1]
      labels: [bucket:ready]
    issue_filter:
      labels: [agent:ready]
      assignee: $MAESTRO_USER
    agent_type: triage
    poll_interval: 30s

agent_types:
  - name: triage
    agent_pack: triage
    instance_name: epic-triage
    approval_policy: auto
    stall_timeout: 10m

hooks:
  timeout: 30s

workspace:
  root: ~/.local/share/maestro/workspaces

state:
  dir: ~/.local/state/maestro
  retry_base: 10s
  max_retry_backoff: 5m
  max_attempts: 3

logging:
  level: info
  dir: ~/.local/state/maestro/logs
