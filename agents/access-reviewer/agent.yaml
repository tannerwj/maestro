name: access-reviewer
description: IAM access review agent for periodic and ad-hoc compliance reviews. Enumerates access, compares against policy, classifies findings, creates remediation sub-issues.
instance_name: access-reviewer
harness: claude-code
workspace: git-clone
prompt: prompt.md
approval_policy: auto
max_concurrent: 1
context_files:
  - context/operating-rules.md
  - context/severity-classification.md
